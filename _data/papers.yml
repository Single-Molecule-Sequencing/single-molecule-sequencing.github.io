# Hub cards: research themes, open software, and public resources.
# index.html loops over these via Jekyll liquid. Edit here, commit, Pages rebuilds.
#
# Each entry: title, description (HTML allowed, <em> preserved), url, link_text.
# `link_text` controls the card CTA label. Defaults to "Repo" if omitted.
#
# PUBLIC-CONTENT POLICY:
#   - Link only to public repositories and public Pages sites.
#   - Describe research at a general / public-appropriate level.
#   - Do not reference unpublished manuscripts, journal targets, or drafting
#     state; the authoritative publication list lives on the Athey Lab site.
#   - Do not link to private-repo Pages subdomains (randomized URLs).

themes:
  - title: "Pharmacogenomics"
    description: "Long-read sequencing of pharmacogenomic loci — including the complex <em>CYP2D6</em> region — with haplotype-aware star-allele calling and clinical-actionability reporting."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/drylab.html"
    link_text: "Learn more"

  - title: "Targeted Enrichment"
    description: "Cas9/CRISPR-based targeted sequencing and real-time nanopore adaptive sampling for focused, cost-efficient long-read panels."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/wetlab.html"
    link_text: "Learn more"

  - title: "Single-Molecule Accuracy"
    description: "Empirical characterization of per-read error rates and basecaller behavior using sequence-defined DNA standards and reference-grade controls."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/drylab.html"
    link_text: "Learn more"

  - title: "Long-Read Bioinformatics"
    description: "End-to-end pipelines for Oxford Nanopore and PacBio HiFi data — basecalling, alignment, methylation handling, structural-variant calling, and visualization."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/drylab.html"
    link_text: "Learn more"

  - title: "Assay Development"
    description: "Wet-lab methods for guide-panel design, nickase chemistry, library-prep optimization, and fragment-analysis QC."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/wetlab.html"
    link_text: "Learn more"

  - title: "Statistical Methods"
    description: "Bayesian and likelihood-based inference for haplotype classification, assay-efficiency modeling, and single-molecule confidence quantification."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/drylab.html"
    link_text: "Learn more"

software:
  - title: "ONT-SMA-seq"
    description: "Single-Molecule Accuracy sequencing workflow for Oxford Nanopore — pure Python plus SQLite for reproducible per-read error measurement."
    url: "https://github.com/Single-Molecule-Sequencing/ONT-SMA-seq"
    link_text: "Repo"

  - title: "CypScope"
    description: "Read-coverage and QC reporting across the <em>CYP2D6</em>, <em>CYP2D7</em>, and <em>CYP2D8P</em> region for ONT sequencing data."
    url: "https://github.com/Single-Molecule-Sequencing/CypScope"
    link_text: "Repo"

  - title: "barbell"
    description: "Fast and accurate nanopore demultiplexing — implemented in Rust for high-throughput barcode assignment."
    url: "https://github.com/Single-Molecule-Sequencing/barbell"
    link_text: "Repo"

  - title: "dorado-run"
    description: "Oxford Nanopore Dorado basecaller orchestration pipeline — reproducible batch runs and model management."
    url: "https://github.com/Single-Molecule-Sequencing/dorado-run"
    link_text: "Repo"

  - title: "fragment-viewer"
    description: "Interactive CE / GeneMapper fragment analyzer. Electropherograms, dye-calibrated peak classification, Cas9 cut-site prediction."
    url: "https://single-molecule-sequencing.github.io/fragment-viewer/"
    link_text: "Open viewer"

  - title: "sss"
    description: "Sequencing sample-sheet generator for wet-lab workflows."
    url: "https://single-molecule-sequencing.github.io/sss/"
    link_text: "Open tool"

  - title: "PGx-prep"
    description: "Preparatory demultiplexing and HPC/SLURM workflows on BAM files for the ONT pharmacogenomics pipeline."
    url: "https://github.com/Single-Molecule-Sequencing/PGx-prep"
    link_text: "Repo"

  - title: "CypScope-prep"
    description: "Preparatory FASTQ extraction and alignment on per-sample BAMs for CypScope."
    url: "https://github.com/Single-Molecule-Sequencing/CypScope-prep"
    link_text: "Repo"

resources:
  - title: "Athey Lab Homepage"
    description: "Public-facing lab site — team, publications, research, and contact."
    url: "https://single-molecule-sequencing.github.io/AtheyLab-Website/"
    link_text: "Visit site"

  - title: "ont-ecosystem"
    description: "Public documentation for the lab's Oxford Nanopore analysis framework — library modules, CLI tools, and reusable analysis skills."
    url: "https://single-molecule-sequencing.github.io/ont-ecosystem/"
    link_text: "Docs"

  - title: "GitHub Organization"
    description: "Browse the full list of the lab's open-source repositories."
    url: "https://github.com/Single-Molecule-Sequencing"
    link_text: "Open GitHub"
